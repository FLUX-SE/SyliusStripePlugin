Sylius\Component\Payment\Model\PaymentMethodTranslation:
    payment_method_stripe_web_elements_express_checkout_translation:
        name: 'Stripe Web Elements (Express Checkout)'
        locale: 'en_US'
        description: '<paragraph(2)>'
        translatable: '@payment_method_stripe_web_elements_express_checkout'

Sylius\Component\Core\Model\PaymentMethod:
    payment_method_stripe_web_elements_express_checkout:
        code: 'STRIPE_WEB_ELEMENTS_ECE'
        enabled: true
        gatewayConfig: '@gateway_stripe_web_elements_express_checkout'
        currentLocale: 'en_US'
        translations:
            - '@payment_method_stripe_web_elements_express_checkout_translation'
        channels: ['@channel_web']

Sylius\Bundle\PayumBundle\Model\GatewayConfig:
    gateway_stripe_web_elements_express_checkout:
        gatewayName: 'Stripe (Web Elements + Express Checkout)'
        factoryName: 'stripe_web_elements'
        config:
            use_payum: false
            use_authorize: false
            enable_express_checkout: true
            publishable_key: 'pk_test_ece_123'
            secret_key: 'rk_test_ece_123'
            webhook_secret_keys:
                - 'whsec_test_ece_123'
