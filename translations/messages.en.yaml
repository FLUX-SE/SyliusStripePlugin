flux_se_sylius_stripe_plugin:
    gateway_factory:
        stripe_checkout: Stripe (Checkout)
        stripe_web_elements: Stripe (Web Elements)
    form:
        gateway_configuration:
            stripe:
                publishable_key: Publishable key
                secret_key: Restricted API key (recommended) or secret key
                use_authorize: Use authorize
                webhook_secret_keys: Webhook secret keys
                payment_method_types: Payment method types
                info:
                    secret_key_recommended_title: Recommended - Restricted API Key (rk_…)
                    secret_key_recommended_body: Generate a Restricted API Key from your Sylius Stripe App Settings Page. The App ships with the minimum scopes the plugin needs and will be the only supported option in 2.0.
                    secret_key_legacy_body: A standard Stripe secret key (sk_…) from the Stripe Dashboard is still accepted in this version.
                    secret_key_legacy_warning: This gateway uses a standard Stripe secret key. Support for sk_… keys will be removed in plugin 2.0 - switch to a Restricted API Key from the Sylius Stripe App when convenient.
                    use_authorize: When a payment is authorized, the bank guarantees the amount and holds it on the customer’s card for up to seven days.
                    webhook_secret_key: Create a new webhook endpoint to generate a new webhook secret key on the Stripe dashboard and listen for several events.
                    payment_method_types_deprecated: This setting is deprecated and will be removed in Stripe Plugin 2.0. Leave this list empty and manage active payment methods directly in your Stripe Dashboard, so Stripe can dynamically present the best subset to each customer.
                action:
                    open_stripe_app: Open Sylius Stripe App
                    secret_key: Open Stripe Dashboard API keys.
                    webhook_secret_key: Create a new webhook endpoint.
                    manage_payment_methods: Manage payment methods in Stripe Dashboard
    order_pay:
        web_elements:
            pay: Pay
